<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-theme">
</head>
<body>
    <header class="site-header">
        <div class="container nav-container">
            <a href="#about" class="logo">Your Name</a>
            <nav class="main-nav">
                <a href="#about" class="nav-link" data-route="about">About</a>
                <a href="#projects" class="nav-link" data-route="projects">Projects</a>
                <a href="#blog" class="nav-link" data-route="blog">Blog</a>
                <button class="theme-toggle" aria-label="Toggle theme">
                    <span class="theme-icon-light">☀</span>
                    <span class="theme-icon-dark">☾</span>
                </button>
            </nav>
            <button class="mobile-menu-btn" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main id="app" class="container">
        <!-- Content injected by JS -->
    </main>

    <footer class="site-footer">
        <div class="container"></div>
    </footer>

    <!-- Interactive Cat -->
    <div class="cat-container sleeping right" id="cat" title="Hover for options!">
        <div class="cat-wrapper">
            <div class="cat-head">
                <div class="eye left"><div class="pupil"></div></div>
                <div class="eye right"><div class="pupil"></div></div>
                <div class="nose"></div>
            </div>
            <div class="cat-body"></div>
            <div class="legs">
                <div class="leg"></div>
                <div class="leg"></div>
                <div class="leg"></div>
                <div class="leg"></div>
            </div>
            <div class="tail"></div>
        </div>
        <div class="zzz-box">
            <span>z</span>
            <span>Z</span>
        </div>
        <div class="cat-menu" id="cat-menu">
            <button class="cat-option" data-action="dance">💃 Dance</button>
            <button class="cat-option" data-action="run">🏃 Run</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
